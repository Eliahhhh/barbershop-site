<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="45"/>
    </clipPath>
  </defs>
  <!-- Black fill, gold border -->
  <circle cx="50" cy="50" r="47.5" fill="#000000" stroke="#FBBF24" stroke-width="5"/>
  <g clip-path="url(#c)">
    <!-- "\" slash: top-right to bottom-left -->
    <line x1="67" y1="13" x2="33" y2="87"
          stroke="#FBBF24" stroke-width="11" stroke-linecap="butt"/>
    <!-- F — left half -->
    <text x="25" y="50"
          font-family="Impact,'Arial Narrow',Arial,sans-serif"
          font-size="42" font-weight="900"
          fill="#FBBF24"
          text-anchor="middle"
          dominant-baseline="central">F</text>
    <!-- D — right half -->
    <text x="75" y="50"
          font-family="Impact,'Arial Narrow',Arial,sans-serif"
          font-size="42" font-weight="900"
          fill="#FBBF24"
          text-anchor="middle"
          dominant-baseline="central">D</text>
  </g>
</svg>
